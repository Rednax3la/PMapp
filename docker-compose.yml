version: '3.9'

services:
  # Flask Backend API
  backend:
    build:
      context: ./scheduling-api
      dockerfile: Dockerfile
    container_name: zainpm_backend
    restart: unless-stopped
    env_file:
      - ./scheduling-api/.env
    ports:
      - "5001:5001"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - zainpm_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/auth/validate')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Vue.js Frontend (served via nginx)
  frontend:
    build:
      context: ./Frontend/website
      dockerfile: Dockerfile
      args:
        VUE_APP_API_URL: /api
        VUE_APP_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    container_name: zainpm_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - zainpm_net

volumes:
  uploads_data:

networks:
  zainpm_net:
    driver: bridge
