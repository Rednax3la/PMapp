server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — required for Vue Router history mode
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Flask backend service
    location /api/ {
        proxy_pass http://backend:5001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow cookies to pass through (required for JWT cookie auth)
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / "/; SameSite=None";
    }

    # Stripe webhook must bypass /api prefix (Stripe sends directly to /stripe/webhook)
    location /stripe/ {
        proxy_pass http://backend:5001/stripe/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip compression for faster delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_proxied any;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
